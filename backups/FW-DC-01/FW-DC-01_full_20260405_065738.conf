#config-version=FortiGate-1000E-v7.4.4:opmode=0:vdom=1:user=FW-DC-01
#conf_file_ver=1234567890
#buildno=1234
#global_vdom=1
config system global
    set admintimeout 30
    set alias "FW-DC-01"
    set hostname "fw-dc-01"
    set timezone 04
end
config system interface
    edit "port1"
        set vdom "root"
        set ip 10.0.2.1 255.255.255.0
        set allowaccess ping https ssh snmp
        set type physical
    next
    edit "port2"
        set vdom "root"
        set ip 192.168.1.1 255.255.255.0
        set allowaccess ping https
        set type physical
    next
end
config firewall policy
    edit 1
        set name "Allow-LAN-to-Internet"
        set srcintf "port2"
        set dstintf "port1"
        set srcaddr "all"
        set dstaddr "all"
        set action accept
        set schedule "always"
        set service "ALL"
        set nat enable
        set logtraffic all
    next
    edit 2
        set name "VPN-Traffic"
        set srcintf "port2"
        set dstintf "vpn-tunnel"
        set srcaddr "LAN-subnet"
        set dstaddr "Remote-subnet"
        set action accept
        set schedule "always"
        set service "ALL"
    next
end
config vpn ipsec phase1-interface
    edit "HQ-Tunnel"
        set interface "port1"
        set ike-version 2
        set peertype any
        set proposal aes256-sha256
        set remote-gw 10.0.1.1
        set psksecret ENC_DEMO_KEY
    next
end
