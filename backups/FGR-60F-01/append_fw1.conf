
config system vdom
    edit "CORP"
    next
    edit "BRANCH"
    next
end

config vdom
edit "CORP"

config system settings
    set gui-dynamic-routing enable
end

config vpn ipsec phase1-interface
    edit "CORP-VPN"
        set interface "internal2"
        set ike-version 2
        set peertype any
        set net-device disable
        set proposal aes256-sha256 aes256gcm
        set dpd on-idle
        set dpd-retrycount 3
        set dpd-retryinterval 10
        set dhgrp 14 5
        set nattraversal disable
        set remote-gw 10.0.0.2
        set psksecret "C0rp-IPSEC-K3y!FGR60F-2026"
    next
end

config vpn ipsec phase2-interface
    edit "CORP-VPN-P2"
        set phase1name "CORP-VPN"
        set proposal aes256-sha256 aes256gcm
        set dhgrp 14
        set auto-negotiate enable
        set src-subnet 0.0.0.0 0.0.0.0
        set dst-subnet 0.0.0.0 0.0.0.0
    next
end

config system interface
    edit "CORP-VPN"
        set ip 10.10.10.1 255.255.255.252
        set remote-ip 10.10.10.2 255.255.255.252
        set description "IPSec Tunnel to FGR-60F-02 CORP"
    next
end

config router ospf
    set router-id 10.255.255.1
    set log-neighbour-changes enable
    config area
        edit 0.0.0.0
        next
        edit 0.0.0.1
            set type nssa
        next
    end
    config network
        edit 1
            set prefix 192.168.10.0 255.255.255.0
            set area 0.0.0.0
        next
        edit 2
            set prefix 192.168.20.0 255.255.255.0
            set area 0.0.0.0
        next
        edit 3
            set prefix 192.168.30.0 255.255.255.0
            set area 0.0.0.1
        next
        edit 4
            set prefix 10.10.10.0 255.255.255.252
            set area 0.0.0.0
        next
        edit 5
            set prefix 10.0.0.0 255.255.255.252
            set area 0.0.0.0
        next
        edit 6
            set prefix 10.255.255.1 255.255.255.255
            set area 0.0.0.0
        next
    end
    config ospf-interface
        edit "int3-ospf"
            set interface "internal3"
            set cost 10
            set hello-interval 10
            set dead-interval 40
            set network-type broadcast
        next
        edit "int3.10-ospf"
            set interface "internal3.10"
            set cost 10
            set hello-interval 10
            set dead-interval 40
            set network-type broadcast
        next
        edit "int3.30-ospf"
            set interface "internal3.30"
            set cost 20
            set hello-interval 10
            set dead-interval 40
            set network-type broadcast
            set passive enable
        next
        edit "tunnel-ospf"
            set interface "CORP-VPN"
            set cost 100
            set hello-interval 10
            set dead-interval 40
            set network-type point-to-point
        next
    end
    config redistribute "connected"
        set status enable
        set metric 100
        set metric-type 2
    end
    config redistribute "static"
        set status enable
        set metric 200
        set metric-type 2
    end
end

config firewall address
    edit "CORP-LAN-A"
        set subnet 192.168.10.0 255.255.255.0
    next
    edit "CORP-LAN-B"
        set subnet 192.168.20.0 255.255.255.0
    next
    edit "CORP-LAN-C"
        set subnet 192.168.30.0 255.255.255.0
    next
    edit "REMOTE-CORP-LAN-A"
        set subnet 192.168.110.0 255.255.255.0
    next
    edit "REMOTE-CORP-LAN-B"
        set subnet 192.168.120.0 255.255.255.0
    next
    edit "REMOTE-CORP-LAN-C"
        set subnet 192.168.130.0 255.255.255.0
    next
end

config firewall addrgrp
    edit "CORP-LOCAL"
        set member "CORP-LAN-A" "CORP-LAN-B" "CORP-LAN-C"
    next
    edit "CORP-REMOTE"
        set member "REMOTE-CORP-LAN-A" "REMOTE-CORP-LAN-B" "REMOTE-CORP-LAN-C"
    next
end

config firewall service custom
    edit "SCADA-MODBUS"
        set tcp-portrange 502
    next
    edit "SCADA-OPCUA"
        set tcp-portrange 4840
    next
end

config firewall policy
    edit 1
        set name "LAN-to-VPN-CORP"
        set srcintf "internal3" "internal3.10" "internal3.30"
        set dstintf "CORP-VPN"
        set srcaddr "CORP-LOCAL"
        set dstaddr "CORP-REMOTE"
        set action accept
        set schedule "always"
        set service "ALL"
        set logtraffic all
    next
    edit 2
        set name "VPN-to-LAN-CORP"
        set srcintf "CORP-VPN"
        set dstintf "internal3" "internal3.10" "internal3.30"
        set srcaddr "CORP-REMOTE"
        set dstaddr "CORP-LOCAL"
        set action accept
        set schedule "always"
        set service "ALL"
        set logtraffic all
    next
    edit 3
        set name "Engineering-to-SCADA"
        set srcintf "internal3"
        set dstintf "internal3.10"
        set srcaddr "CORP-LAN-A"
        set dstaddr "CORP-LAN-B"
        set action accept
        set schedule "always"
        set service "SCADA-MODBUS" "SCADA-OPCUA" "HTTPS" "SSH" "PING"
        set logtraffic all
    next
    edit 4
        set name "IoT-to-Engineering"
        set srcintf "internal3.30"
        set dstintf "internal3"
        set srcaddr "CORP-LAN-C"
        set dstaddr "CORP-LAN-A"
        set action accept
        set schedule "always"
        set service "PING"
        set logtraffic all
    next
    edit 100
        set name "DENY-ALL-CORP"
        set srcintf "any"
        set dstintf "any"
        set srcaddr "all"
        set dstaddr "all"
        set action deny
        set schedule "always"
        set service "ALL"
        set logtraffic all
    next
end

end

config vdom
edit "BRANCH"

config system settings
    set gui-dynamic-routing enable
end

config vpn ipsec phase1-interface
    edit "BRANCH-VPN"
        set interface "internal2.100"
        set ike-version 2
        set peertype any
        set net-device disable
        set proposal aes256-sha256 aes256gcm
        set dpd on-idle
        set dpd-retrycount 3
        set dpd-retryinterval 10
        set dhgrp 14 5
        set nattraversal disable
        set remote-gw 10.0.100.2
        set psksecret "Br4nch-IPSEC-K3y!FGR60F-2026"
    next
end

config vpn ipsec phase2-interface
    edit "BRANCH-VPN-P2"
        set phase1name "BRANCH-VPN"
        set proposal aes256-sha256 aes256gcm
        set dhgrp 14
        set auto-negotiate enable
        set src-subnet 0.0.0.0 0.0.0.0
        set dst-subnet 0.0.0.0 0.0.0.0
    next
end

config system interface
    edit "BRANCH-VPN"
        set ip 10.20.20.1 255.255.255.252
        set remote-ip 10.20.20.2 255.255.255.252
        set description "IPSec Tunnel to FGR-60F-02 BRANCH"
    next
end

config router bgp
    set as 65001
    set router-id 10.255.254.1
    set bestpath-med-missing-as-worst enable
    set graceful-restart enable
    config neighbor
        edit "10.20.20.2"
            set remote-as 65002
            set description "FGR-60F-02 eBGP peer"
            set soft-reconfiguration enable
            set keep-alive-timer 30
            set holdtime-timer 90
            set next-hop-self enable
            set capability-graceful-restart enable
            set prefix-list-in "BGP-IN"
            set prefix-list-out "BGP-OUT"
        next
    end
    config network
        edit 1
            set prefix 172.16.10.0 255.255.255.0
        next
        edit 2
            set prefix 172.16.20.0 255.255.255.0
        next
        edit 3
            set prefix 172.16.40.0 255.255.255.0
        next
    end
    config redistribute "connected"
        set status enable
    end
end

config router prefix-list
    edit "BGP-IN"
        config rule
            edit 1
                set prefix 172.16.0.0 255.255.0.0
                set ge 16
                set le 28
                set action permit
            next
            edit 100
                set action deny
                set prefix 0.0.0.0 0.0.0.0
            next
        end
    next
    edit "BGP-OUT"
        config rule
            edit 1
                set prefix 172.16.10.0 255.255.255.0
                set action permit
            next
            edit 2
                set prefix 172.16.20.0 255.255.255.0
                set action permit
            next
            edit 3
                set prefix 172.16.40.0 255.255.255.0
                set action permit
            next
            edit 100
                set action deny
                set prefix 0.0.0.0 0.0.0.0
            next
        end
    next
end

config firewall address
    edit "BRANCH-LAN-A"
        set subnet 172.16.10.0 255.255.255.0
    next
    edit "BRANCH-LAN-B"
        set subnet 172.16.20.0 255.255.255.0
    next
    edit "BRANCH-LAN-C"
        set subnet 172.16.40.0 255.255.255.0
    next
    edit "REMOTE-BRANCH-LAN-A"
        set subnet 172.16.110.0 255.255.255.0
    next
    edit "REMOTE-BRANCH-LAN-B"
        set subnet 172.16.120.0 255.255.255.0
    next
    edit "REMOTE-BRANCH-LAN-C"
        set subnet 172.16.140.0 255.255.255.0
    next
end

config firewall addrgrp
    edit "BRANCH-LOCAL"
        set member "BRANCH-LAN-A" "BRANCH-LAN-B" "BRANCH-LAN-C"
    next
    edit "BRANCH-REMOTE"
        set member "REMOTE-BRANCH-LAN-A" "REMOTE-BRANCH-LAN-B" "REMOTE-BRANCH-LAN-C"
    next
end

config firewall service custom
    edit "SIP-UDP"
        set udp-portrange 5060-5061
    next
    edit "RTP-RANGE"
        set udp-portrange 10000-20000
    next
end

config firewall policy
    edit 1
        set name "LAN-to-VPN-BRANCH"
        set srcintf "internal4" "internal4.20" "internal4.40"
        set dstintf "BRANCH-VPN"
        set srcaddr "BRANCH-LOCAL"
        set dstaddr "BRANCH-REMOTE"
        set action accept
        set schedule "always"
        set service "ALL"
        set logtraffic all
    next
    edit 2
        set name "VPN-to-LAN-BRANCH"
        set srcintf "BRANCH-VPN"
        set dstintf "internal4" "internal4.20" "internal4.40"
        set srcaddr "BRANCH-REMOTE"
        set dstaddr "BRANCH-LOCAL"
        set action accept
        set schedule "always"
        set service "ALL"
        set logtraffic all
    next
    edit 3
        set name "Users-to-Servers"
        set srcintf "internal4.20"
        set dstintf "internal4"
        set srcaddr "BRANCH-LAN-B"
        set dstaddr "BRANCH-LAN-A"
        set action accept
        set schedule "always"
        set service "HTTPS" "HTTP" "SSH" "DNS" "PING"
        set logtraffic all
    next
    edit 4
        set name "VoIP-to-Servers"
        set srcintf "internal4.40"
        set dstintf "internal4"
        set srcaddr "BRANCH-LAN-C"
        set dstaddr "BRANCH-LAN-A"
        set action accept
        set schedule "always"
        set service "SIP-UDP" "RTP-RANGE" "PING"
        set logtraffic all
    next
    edit 100
        set name "DENY-ALL-BRANCH"
        set srcintf "any"
        set dstintf "any"
        set srcaddr "all"
        set dstaddr "all"
        set action deny
        set schedule "always"
        set service "ALL"
        set logtraffic all
    next
end

end
