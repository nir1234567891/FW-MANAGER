#config-version=FortiGate-Rugged-60F-v7.2.8:opmode=0:vdom=1:user=admin
#conf_file_ver=29031200
#buildno=1577
#global_vdom=1

###############################################################################
#  FGR-60F-01 | FortiGate Rugged 60F - Firewall 1
#  Multi-VDOM: root (Management) | CORP (OSPF) | BRANCH (BGP)
#  Inter-FW Link: port2 <-> port2 (FGR-60F-02)
#  IPSec tunnels per VDOM over port2
###############################################################################

# =============================================================================
# GLOBAL SETTINGS
# =============================================================================
config system global
    set admintimeout 60
    set alias "FGR-60F-01"
    set hostname "FGR-60F-01"
    set timezone 04
    set vdom-mode multi-vdom
    set admin-sport 443
    set admin-ssh-port 22
    set gui-theme mariner
    set admin-server-cert "self-sign"
    set admin-https-redirect enable
    set strong-crypto enable
    set gui-allow-unnamed-policy disable
    set revision-backup-on-logout enable
    set revision-image-auto-backup enable
end

# =============================================================================
# ADMIN PROFILES
# =============================================================================
config system accprofile
    edit "network-admin"
        set secfabgrp read-write
        set ftviewgrp read-write
        set authgrp read-write
        set sysgrp read-write
        set netgrp read-write
        set loggrp read-write
        set fwgrp read-write
        set vpngrp read-write
        set utmgrp read-write
        set wifi read-write
    next
    edit "readonly-admin"
        set secfabgrp read
        set ftviewgrp read
        set authgrp read
        set sysgrp read
        set netgrp read
        set loggrp read
        set fwgrp read
        set vpngrp read
        set utmgrp read
        set wifi read
    next
end

# =============================================================================
# VDOM DEFINITIONS
# =============================================================================
config system vdom
    edit "CORP"
    next
    edit "BRANCH"
    next
end

# =============================================================================
# DNS
# =============================================================================
config system dns
    set primary 8.8.8.8
    set secondary 8.8.4.4
    set protocol cleartext
end

# =============================================================================
# NTP
# =============================================================================
config system ntp
    set ntpsync enable
    set type fortiguard
    set syncinterval 60
end

# =============================================================================
# SNMP
# =============================================================================
config system snmp sysinfo
    set status enable
    set description "FortiGate Rugged 60F - Site A"
    set contact-info "noc@company.local"
    set location "Industrial Site A - Rack 1"
end

config system snmp community
    edit 1
        set name "monitoring-ro"
        config hosts
            edit 1
                set ip 10.99.99.0 255.255.255.0
            next
        end
        set query-v2c-status enable
        set trap-v2c-status enable
    next
end

# =============================================================================
# LOGGING & SYSLOG
# =============================================================================
config log syslogd setting
    set status enable
    set server "10.99.99.10"
    set port 514
    set facility local7
    set source-ip 1.1.1.1
    set format default
end

config log memory setting
    set status enable
end

config log memory filter
    set severity information
end

# =============================================================================
# INTERFACES
# =============================================================================
config system interface
    # --- ROOT VDOM: Management & WAN ---
    edit "wan1"
        set vdom "root"
        set mode dhcp
        set allowaccess ping https fgfm
        set type physical
        set role wan
        set description "WAN Uplink - DHCP - Remote Management"
        set snmp-index 1
        set mtu-override enable
        set mtu 1500
    next
    edit "port1"
        set vdom "root"
        set ip 1.1.1.1 255.255.255.248
        set allowaccess ping https ssh
        set type physical
        set role lan
        set description "Local Management - HTTPS & SSH"
        set snmp-index 2
    next

    # --- CORP VDOM: OSPF Networks + IPSec Underlay ---
    edit "port2"
        set vdom "CORP"
        set ip 10.0.0.1 255.255.255.252
        set allowaccess ping
        set type physical
        set description "Inter-FW Link to FGR-60F-02 (CORP IPSec Underlay)"
        set snmp-index 3
        set mtu-override enable
        set mtu 1500
    next
    edit "port3"
        set vdom "CORP"
        set ip 192.168.10.1 255.255.255.0
        set allowaccess ping https ssh
        set type physical
        set role lan
        set description "CORP OSPF LAN-A (Engineering)"
        set snmp-index 4
        set device-identification enable
    next
    edit "port3.10"
        set vdom "CORP"
        set ip 192.168.20.1 255.255.255.0
        set allowaccess ping https
        set interface "port3"
        set vlanid 10
        set description "CORP OSPF LAN-B (SCADA/OT)"
        set device-identification enable
    next
    edit "port3.30"
        set vdom "CORP"
        set ip 192.168.30.1 255.255.255.0
        set allowaccess ping
        set interface "port3"
        set vlanid 30
        set description "CORP OSPF LAN-C (Printers/IoT)"
        set device-identification enable
    next

    # --- BRANCH VDOM: BGP Networks + IPSec Underlay ---
    edit "port2.100"
        set vdom "BRANCH"
        set ip 10.0.100.1 255.255.255.252
        set allowaccess ping
        set interface "port2"
        set vlanid 100
        set description "Inter-FW Link to FGR-60F-02 (BRANCH IPSec Underlay)"
    next
    edit "port4"
        set vdom "BRANCH"
        set ip 172.16.10.1 255.255.255.0
        set allowaccess ping https ssh
        set type physical
        set role lan
        set description "BRANCH BGP LAN-A (Servers)"
        set snmp-index 5
        set device-identification enable
    next
    edit "port4.20"
        set vdom "BRANCH"
        set ip 172.16.20.1 255.255.255.0
        set allowaccess ping https
        set interface "port4"
        set vlanid 20
        set description "BRANCH BGP LAN-B (Users)"
        set device-identification enable
    next
    edit "port4.40"
        set vdom "BRANCH"
        set ip 172.16.40.1 255.255.255.0
        set allowaccess ping
        set interface "port4"
        set vlanid 40
        set description "BRANCH BGP LAN-C (VoIP)"
        set device-identification enable
    next

    # --- Loopbacks ---
    edit "lo-corp"
        set vdom "CORP"
        set type loopback
        set ip 10.255.255.1 255.255.255.255
        set description "CORP Router-ID Loopback"
    next
    edit "lo-branch"
        set vdom "BRANCH"
        set type loopback
        set ip 10.255.254.1 255.255.255.255
        set description "BRANCH Router-ID Loopback"
    next
end

# =============================================================================
# SYSTEM ZONES (for easier policy management)
# =============================================================================
config vdom
edit "CORP"

config system zone
    edit "CORP-LAN-ZONE"
        set interface "port3" "port3.10" "port3.30"
        set description "All CORP internal LANs"
    next
end

end

config vdom
edit "BRANCH"

config system zone
    edit "BRANCH-LAN-ZONE"
        set interface "port4" "port4.20" "port4.40"
        set description "All BRANCH internal LANs"
    next
end

end

# =============================================================================
# ROOT VDOM - Management Policies
# =============================================================================
config vdom
edit "root"

config system settings
    set gui-dns-database enable
    set gui-dynamic-routing enable
end

config router static
    edit 1
        set dst 0.0.0.0 0.0.0.0
        set gateway 0.0.0.0
        set device "wan1"
        set comment "Default route via WAN1 DHCP"
        set dynamic-gateway enable
    next
end

config firewall address
    edit "MGMT-NET"
        set subnet 1.1.1.0 255.255.255.248
        set comment "Local management subnet"
    next
    edit "RFC1918-10"
        set subnet 10.0.0.0 255.0.0.0
    next
    edit "RFC1918-172"
        set subnet 172.16.0.0 255.240.0.0
    next
    edit "RFC1918-192"
        set subnet 192.168.0.0 255.255.0.0
    next
end

config firewall addrgrp
    edit "RFC1918-ALL"
        set member "RFC1918-10" "RFC1918-172" "RFC1918-192"
        set comment "All RFC1918 private ranges"
    next
end

config firewall service custom
    edit "HTTPS-MGMT"
        set tcp-portrange 443
        set comment "HTTPS Management"
    next
    edit "SSH-MGMT"
        set tcp-portrange 22
        set comment "SSH Management"
    next
end

config firewall service group
    edit "MGMT-SERVICES"
        set member "HTTPS-MGMT" "SSH-MGMT" "PING"
        set comment "Management access services"
    next
end

config firewall policy
    edit 1
        set name "WAN-to-FW-MGMT"
        set srcintf "wan1"
        set dstintf "any"
        set srcaddr "all"
        set dstaddr "all"
        set action accept
        set schedule "always"
        set service "HTTPS-MGMT"
        set logtraffic all
        set comments "Allow remote HTTPS management via WAN1"
    next
    edit 2
        set name "LOCAL-MGMT-ACCESS"
        set srcintf "port1"
        set dstintf "any"
        set srcaddr "MGMT-NET"
        set dstaddr "all"
        set action accept
        set schedule "always"
        set service "MGMT-SERVICES"
        set logtraffic all
        set comments "Allow local management via port1"
    next
    edit 100
        set name "DENY-ALL-ROOT"
        set srcintf "any"
        set dstintf "any"
        set srcaddr "all"
        set dstaddr "all"
        set action deny
        set schedule "always"
        set service "ALL"
        set logtraffic all
        set comments "Implicit deny with logging"
    next
end

end

# =============================================================================
# CORP VDOM - IPSec VPN
# =============================================================================
config vdom
edit "CORP"

config system settings
    set gui-dns-database enable
    set gui-dynamic-routing enable
    set gui-load-balance enable
end

config vpn ipsec phase1-interface
    edit "CORP-VPN"
        set interface "port2"
        set ike-version 2
        set peertype any
        set net-device disable
        set proposal aes256-sha256 aes256gcm
        set dpd on-idle
        set dpd-retrycount 3
        set dpd-retryinterval 10
        set dhgrp 14 5
        set nattraversal disable
        set remote-gw 10.0.0.2
        set psksecret "C0rp-IPSEC-K3y!FGR60F-2026"
        set comments "IPSec to FGR-60F-02 CORP VDOM"
    next
end

config vpn ipsec phase2-interface
    edit "CORP-VPN-P2"
        set phase1name "CORP-VPN"
        set proposal aes256-sha256 aes256gcm
        set dhgrp 14
        set auto-negotiate enable
        set src-subnet 0.0.0.0 0.0.0.0
        set dst-subnet 0.0.0.0 0.0.0.0
        set comments "CORP VPN Phase2 - all traffic"
    next
end

# Tunnel interface IP
config system interface
    edit "CORP-VPN"
        set ip 10.10.10.1 255.255.255.252
        set remote-ip 10.10.10.2 255.255.255.252
        set description "IPSec Tunnel to FGR-60F-02 CORP"
    next
end

# =============================================================================
# CORP VDOM - OSPF
# =============================================================================
config router ospf
    set router-id 10.255.255.1
    set default-information-originate enable
    set log-neighbour-changes enable
    config area
        edit 0.0.0.0
            set comments "OSPF Backbone Area"
        next
        edit 0.0.0.1
            set comments "OSPF Area 1 - OT Devices"
            set type nssa
        next
    end
    config network
        edit 1
            set prefix 192.168.10.0 255.255.255.0
            set area 0.0.0.0
        next
        edit 2
            set prefix 192.168.20.0 255.255.255.0
            set area 0.0.0.0
        next
        edit 3
            set prefix 192.168.30.0 255.255.255.0
            set area 0.0.0.1
        next
        edit 4
            set prefix 10.10.10.0 255.255.255.252
            set area 0.0.0.0
        next
        edit 5
            set prefix 10.0.0.0 255.255.255.252
            set area 0.0.0.0
        next
        edit 6
            set prefix 10.255.255.1 255.255.255.255
            set area 0.0.0.0
        next
    end
    config ospf-interface
        edit "port3-ospf"
            set interface "port3"
            set cost 10
            set hello-interval 10
            set dead-interval 40
            set network-type broadcast
            set comments "OSPF on Engineering LAN"
        next
        edit "port3.10-ospf"
            set interface "port3.10"
            set cost 10
            set hello-interval 10
            set dead-interval 40
            set network-type broadcast
            set comments "OSPF on SCADA LAN"
        next
        edit "port3.30-ospf"
            set interface "port3.30"
            set cost 20
            set hello-interval 10
            set dead-interval 40
            set network-type broadcast
            set passive enable
            set comments "OSPF Passive on IoT LAN"
        next
        edit "tunnel-ospf"
            set interface "CORP-VPN"
            set cost 100
            set hello-interval 10
            set dead-interval 40
            set network-type point-to-point
            set comments "OSPF over IPSec tunnel"
        next
    end
    config redistribute "connected"
        set status enable
        set metric 100
        set metric-type 2
    end
    config redistribute "static"
        set status enable
        set metric 200
        set metric-type 2
    end
end

# =============================================================================
# CORP VDOM - Firewall Objects
# =============================================================================
config firewall address
    edit "CORP-LAN-A-Engineering"
        set subnet 192.168.10.0 255.255.255.0
        set comment "Engineering Network"
    next
    edit "CORP-LAN-B-SCADA"
        set subnet 192.168.20.0 255.255.255.0
        set comment "SCADA/OT Network"
    next
    edit "CORP-LAN-C-IoT"
        set subnet 192.168.30.0 255.255.255.0
        set comment "Printers & IoT"
    next
    edit "REMOTE-CORP-LAN-A"
        set subnet 192.168.110.0 255.255.255.0
        set comment "Remote Site Engineering"
    next
    edit "REMOTE-CORP-LAN-B"
        set subnet 192.168.120.0 255.255.255.0
        set comment "Remote Site SCADA"
    next
    edit "REMOTE-CORP-LAN-C"
        set subnet 192.168.130.0 255.255.255.0
        set comment "Remote Site IoT"
    next
    edit "OSPF-TUNNEL-NET"
        set subnet 10.10.10.0 255.255.255.252
        set comment "OSPF tunnel transit network"
    next
end

config firewall addrgrp
    edit "CORP-ALL-LOCAL"
        set member "CORP-LAN-A-Engineering" "CORP-LAN-B-SCADA" "CORP-LAN-C-IoT"
        set comment "All local CORP networks"
    next
    edit "CORP-ALL-REMOTE"
        set member "REMOTE-CORP-LAN-A" "REMOTE-CORP-LAN-B" "REMOTE-CORP-LAN-C"
        set comment "All remote CORP networks"
    next
end

config firewall service custom
    edit "SCADA-MODBUS"
        set tcp-portrange 502
        set comment "Modbus TCP for SCADA"
    next
    edit "SCADA-OPCUA"
        set tcp-portrange 4840
        set comment "OPC-UA for SCADA"
    next
    edit "INDUSTRIAL-MQTT"
        set tcp-portrange 1883 8883
        set comment "MQTT and MQTT-TLS for IoT"
    next
end

config firewall service group
    edit "SCADA-SERVICES"
        set member "SCADA-MODBUS" "SCADA-OPCUA"
        set comment "SCADA protocol services"
    next
    edit "IOT-SERVICES"
        set member "INDUSTRIAL-MQTT" "PING"
        set comment "IoT protocol services"
    next
end

config firewall schedule recurring
    edit "BUSINESS-HOURS"
        set start 07:00
        set end 19:00
        set day sunday monday tuesday wednesday thursday
    next
end

# =============================================================================
# CORP VDOM - Firewall Policies
# =============================================================================
config firewall policy
    edit 1
        set name "Engineering-to-SCADA"
        set srcintf "port3"
        set dstintf "port3.10"
        set srcaddr "CORP-LAN-A-Engineering"
        set dstaddr "CORP-LAN-B-SCADA"
        set action accept
        set schedule "BUSINESS-HOURS"
        set service "SCADA-SERVICES" "HTTPS" "SSH" "PING"
        set logtraffic all
        set comments "Engineering access to SCADA systems - business hours only"
    next
    edit 2
        set name "SCADA-to-Engineering"
        set srcintf "port3.10"
        set dstintf "port3"
        set srcaddr "CORP-LAN-B-SCADA"
        set dstaddr "CORP-LAN-A-Engineering"
        set action accept
        set schedule "always"
        set service "PING" "SNMP"
        set logtraffic all
        set comments "SCADA monitoring back to Engineering"
    next
    edit 3
        set name "IoT-to-Engineering"
        set srcintf "port3.30"
        set dstintf "port3"
        set srcaddr "CORP-LAN-C-IoT"
        set dstaddr "CORP-LAN-A-Engineering"
        set action accept
        set schedule "always"
        set service "IOT-SERVICES"
        set logtraffic all
        set comments "IoT telemetry to Engineering servers"
    next
    edit 10
        set name "LAN-to-VPN-CORP"
        set srcintf "port3" "port3.10" "port3.30"
        set dstintf "CORP-VPN"
        set srcaddr "CORP-ALL-LOCAL"
        set dstaddr "CORP-ALL-REMOTE"
        set action accept
        set schedule "always"
        set service "ALL"
        set logtraffic all
        set comments "Local CORP to Remote CORP via IPSec"
    next
    edit 11
        set name "VPN-to-LAN-CORP"
        set srcintf "CORP-VPN"
        set dstintf "port3" "port3.10" "port3.30"
        set srcaddr "CORP-ALL-REMOTE"
        set dstaddr "CORP-ALL-LOCAL"
        set action accept
        set schedule "always"
        set service "ALL"
        set logtraffic all
        set comments "Remote CORP to Local CORP via IPSec"
    next
    edit 20
        set name "InterLAN-CORP"
        set srcintf "CORP-LAN-ZONE"
        set dstintf "CORP-LAN-ZONE"
        set srcaddr "CORP-ALL-LOCAL"
        set dstaddr "CORP-ALL-LOCAL"
        set action accept
        set schedule "always"
        set service "PING"
        set logtraffic all
        set comments "Inter-LAN ICMP within CORP"
    next
    edit 100
        set name "DENY-ALL-CORP"
        set srcintf "any"
        set dstintf "any"
        set srcaddr "all"
        set dstaddr "all"
        set action deny
        set schedule "always"
        set service "ALL"
        set logtraffic all
        set comments "Implicit deny with logging"
    next
end

end

# =============================================================================
# BRANCH VDOM - IPSec VPN
# =============================================================================
config vdom
edit "BRANCH"

config system settings
    set gui-dns-database enable
    set gui-dynamic-routing enable
end

config vpn ipsec phase1-interface
    edit "BRANCH-VPN"
        set interface "port2.100"
        set ike-version 2
        set peertype any
        set net-device disable
        set proposal aes256-sha256 aes256gcm
        set dpd on-idle
        set dpd-retrycount 3
        set dpd-retryinterval 10
        set dhgrp 14 5
        set nattraversal disable
        set remote-gw 10.0.100.2
        set psksecret "Br4nch-IPSEC-K3y!FGR60F-2026"
        set comments "IPSec to FGR-60F-02 BRANCH VDOM"
    next
end

config vpn ipsec phase2-interface
    edit "BRANCH-VPN-P2"
        set phase1name "BRANCH-VPN"
        set proposal aes256-sha256 aes256gcm
        set dhgrp 14
        set auto-negotiate enable
        set src-subnet 0.0.0.0 0.0.0.0
        set dst-subnet 0.0.0.0 0.0.0.0
        set comments "BRANCH VPN Phase2 - all traffic"
    next
end

config system interface
    edit "BRANCH-VPN"
        set ip 10.20.20.1 255.255.255.252
        set remote-ip 10.20.20.2 255.255.255.252
        set description "IPSec Tunnel to FGR-60F-02 BRANCH"
    next
end

# =============================================================================
# BRANCH VDOM - BGP
# =============================================================================
config router bgp
    set as 65001
    set router-id 10.255.254.1
    set bestpath-med-missing-as-worst enable
    set graceful-restart enable
    set graceful-stalepath-time 120
    set graceful-restart-time 120
    config neighbor
        edit "10.20.20.2"
            set remote-as 65002
            set description "FGR-60F-02 BRANCH eBGP peer"
            set soft-reconfiguration enable
            set keep-alive-timer 30
            set holdtime-timer 90
            set connect-timer 10
            set ebgp-multihop 2
            set next-hop-self enable
            set capability-graceful-restart enable
            set prefix-list-in "BRANCH-INBOUND"
            set prefix-list-out "BRANCH-OUTBOUND"
            set route-map-in "RM-BRANCH-IN"
            set route-map-out "RM-BRANCH-OUT"
        next
    end
    config network
        edit 1
            set prefix 172.16.10.0 255.255.255.0
        next
        edit 2
            set prefix 172.16.20.0 255.255.255.0
        next
        edit 3
            set prefix 172.16.40.0 255.255.255.0
        next
        edit 4
            set prefix 10.255.254.1 255.255.255.255
        next
    end
    config redistribute "connected"
        set status enable
    end
    config redistribute "ospf"
        set status enable
    end
end

# =============================================================================
# BRANCH VDOM - BGP Prefix Lists & Route Maps
# =============================================================================
config router prefix-list
    edit "BRANCH-INBOUND"
        config rule
            edit 1
                set prefix 172.16.0.0 255.255.0.0
                set ge 16
                set le 28
                set action permit
            next
            edit 2
                set prefix 10.255.254.0 255.255.254.0
                set ge 32
                set le 32
                set action permit
            next
            edit 100
                set action deny
                set prefix 0.0.0.0 0.0.0.0
                unset ge
                unset le
            next
        end
    next
    edit "BRANCH-OUTBOUND"
        config rule
            edit 1
                set prefix 172.16.10.0 255.255.255.0
                set action permit
            next
            edit 2
                set prefix 172.16.20.0 255.255.255.0
                set action permit
            next
            edit 3
                set prefix 172.16.40.0 255.255.255.0
                set action permit
            next
            edit 100
                set action deny
                set prefix 0.0.0.0 0.0.0.0
                unset ge
                unset le
            next
        end
    next
end

config router community-list
    edit "BRANCH-COMMUNITY"
        config rule
            edit 1
                set action permit
                set match "65001:100"
            next
        end
    next
end

config router route-map
    edit "RM-BRANCH-IN"
        config rule
            edit 1
                set match-ip-address "BRANCH-INBOUND"
                set set-local-preference 200
            next
        end
    next
    edit "RM-BRANCH-OUT"
        config rule
            edit 1
                set match-ip-address "BRANCH-OUTBOUND"
                set set-community "65001:100"
                set set-metric 50
            next
        end
    next
end

# =============================================================================
# BRANCH VDOM - Firewall Objects
# =============================================================================
config firewall address
    edit "BRANCH-LAN-A-Servers"
        set subnet 172.16.10.0 255.255.255.0
        set comment "Server Network"
    next
    edit "BRANCH-LAN-B-Users"
        set subnet 172.16.20.0 255.255.255.0
        set comment "User Network"
    next
    edit "BRANCH-LAN-C-VoIP"
        set subnet 172.16.40.0 255.255.255.0
        set comment "VoIP Network"
    next
    edit "REMOTE-BRANCH-LAN-A"
        set subnet 172.16.110.0 255.255.255.0
        set comment "Remote Site Servers"
    next
    edit "REMOTE-BRANCH-LAN-B"
        set subnet 172.16.120.0 255.255.255.0
        set comment "Remote Site Users"
    next
    edit "REMOTE-BRANCH-LAN-C"
        set subnet 172.16.140.0 255.255.255.0
        set comment "Remote Site VoIP"
    next
end

config firewall addrgrp
    edit "BRANCH-ALL-LOCAL"
        set member "BRANCH-LAN-A-Servers" "BRANCH-LAN-B-Users" "BRANCH-LAN-C-VoIP"
        set comment "All local BRANCH networks"
    next
